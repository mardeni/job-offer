version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - inscricoes-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
        REACT_APP_REQUIRE_MOBILE: ${REACT_APP_REQUIRE_MOBILE:-false}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  inscricoes-data:
    driver: local
